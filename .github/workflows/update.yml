name: Update VPN Gate List

on:
  schedule:
    # Runs every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allows you to manually trigger it

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch VPN Gate CSV
        run: |
          curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "http://www.vpngate.net/api/iphone/" -o vpngate.csv

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add vpngate.csv
          # Only commit and push if the file has actually changed
          if ! git diff --cached --quiet; then
            git commit -m "Update VPN Gate CSV list"
            git push
          else
            echo "No changes in VPN Gate list."
          fi
